name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  maven:
    name: Build (Maven, Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['21', '23']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build & verify
        run: ./mvnw verify -Pcoverage -B --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-reports-java-${{ matrix.java }}
          path: '**/target/surefire-reports/*.xml'
          retention-days: 14

      - name: Upload coverage reports
        if: matrix.java == '21'
        uses: actions/upload-artifact@v4
        with:
          name: maven-coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Test Results (Maven, Java ${{ matrix.java }})
          path: '**/target/surefire-reports/*.xml'
          reporter: java-junit

  gradle:
    name: Build (Gradle, Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['21', '23']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: gradle

      - name: Build & verify
        run: ./gradlew build --no-daemon --warning-mode all

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-reports-java-${{ matrix.java }}
          path: '**/build/reports/tests/'
          retention-days: 14

  eval-tests:
    name: Eval Tests (LLM-backed)
    needs: maven
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run eval tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./mvnw test -Peval-tests -B --no-transfer-progress
